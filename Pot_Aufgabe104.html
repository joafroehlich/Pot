<pre><b><p class ="Aufgabe">Aufgabe 104

<math mathsize="0.9em"><mfenced><mrow><mn mathvariant="bold">15</mn><mo mathvariant="bold">&#xd7;</mo><msqrt><mn mathvariant="bold">50</mn></msqrt><mo mathvariant="bold">+</mo><mn mathvariant="bold">5</mn><mo mathvariant="bold">&#xd7;</mo><msqrt><mn mathvariant="bold">200</mn></msqrt><mo mathvariant="bold">&#x2212;</mo><mn mathvariant="bold">3</mn><mo mathvariant="bold">&#xd7;</mo><msqrt><mn mathvariant="bold">450</mn></msqrt></mrow></mfenced><mo mathvariant="bold">&#xf7;</mo><msqrt><mn mathvariant="bold">10</mn></msqrt></math>

= <math mathsize="0.9em"><mfenced><mrow><mtext mathvariant="bold">15&#xd7;</mtext><msqrt><mtext mathvariant="bold">25&#xd7;2</mtext></msqrt><mtext mathvariant="bold">+5&#xd7;</mtext><msqrt><mtext mathvariant="bold">100&#xd7;2</mtext></msqrt><mtext mathvariant="bold">&#x2212;3&#xd7;</mtext><msqrt><mtext mathvariant="bold">225&#xd7;2</mtext></msqrt></mrow></mfenced><mtext mathvariant="bold">&#xf7;</mtext><msqrt><mtext mathvariant="bold">10</mtext></msqrt></math>

= <math mathsize="0.9em"><mfenced><mrow><mtext mathvariant="bold">15&#xd7;5&#xd7;</mtext><msqrt><mtext mathvariant="bold">2</mtext></msqrt><mtext mathvariant="bold">+5&#xd7;10&#xd7;</mtext><msqrt><mtext mathvariant="bold">2</mtext></msqrt><mtext mathvariant="bold">&#x2212;3&#xd7;15&#xd7;</mtext><msqrt><mtext mathvariant="bold">2</mtext></msqrt></mrow></mfenced><mtext mathvariant="bold">&#xf7;</mtext><msqrt><mtext mathvariant="bold">10</mtext></msqrt></math>

= <math mathsize="0.9em"><mn mathvariant="bold">80</mn><mo mathvariant="bold">&#xd7;</mo><msqrt><mn mathvariant="bold">2</mn></msqrt><mo mathvariant="bold">&#xf7;</mo><msqrt><mn mathvariant="bold">10</mn></msqrt><mo mathvariant="bold">=</mo><mn mathvariant="bold">80</mn><mo mathvariant="bold">&#xd7;</mo><mfrac><msqrt><mn mathvariant="bold">2</mn></msqrt><msqrt><mn mathvariant="bold">10</mn></msqrt></mfrac></math>

= <math mathsize="1.2em"><mfrac><mn mathvariant="bold">80</mn><msqrt><mfrac><mn mathvariant="bold">10</mn><mn mathvariant="bold">2</mn></mfrac></msqrt></mfrac><mo mathvariant="bold">=</mo><mfrac><mn mathvariant="bold">80</mn><msqrt><mn mathvariant="bold">5</mn></msqrt></mfrac></math>

Nenner rational machen:

<math mathsize="1.2em"><mfrac><mrow><mn mathvariant="bold">80</mn><mo mathvariant="bold">&#xd7;</mo><msqrt><mn mathvariant="bold">5</mn></msqrt></mrow><mrow><msqrt><mn mathvariant="bold">5</mn></msqrt><mo mathvariant="bold">&#xd7;</mo><msqrt><mn mathvariant="bold">5</mn></msqrt></mrow></mfrac><mo mathvariant="bold">=</mo><mfrac><mrow><mn mathvariant="bold">80</mn><mo mathvariant="bold">&#xd7;</mo><msqrt><mn mathvariant="bold">5</mn></msqrt></mrow><mn mathvariant="bold">5</mn></mfrac></math>

= <span style="color:red;">16&times;<math mathsize="0.9em"><msqrt><mn mathvariant="bold">5</mn></msqrt></math></span>
