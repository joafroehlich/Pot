<math mathsize="1.2em"><mroot><mrow><msup><mtext>m</mtext><mtext>2</mtext></msup><mtext>&#xd7;</mtext><msqrt><mrow><mtext>m&#xd7;</mtext><mroot><mrow><msup><mtext>m</mtext><mtext>8</mtext></msup><mtext>&#xd7;</mtext><mroot><mrow><msup><mtext>m</mtext><mtext>8</mtext></msup></mrow><mtext>4</mtext></mroot></mrow><mtext>5</mtext></mroot></mrow></msqrt></mrow><mtext>3</mtext></mroot></math> =

= <math mathsize="1.2em"><mroot><mrow><msup><mtext>m</mtext><mtext>2</mtext></msup><mtext>&#xd7;</mtext><msqrt><mrow><mtext>m&#xd7;</mtext><mroot><mrow><msup><mtext>m</mtext><mtext>8</mtext></msup><msup><mtext>&#xd7;m</mtext><mfrac><mtext>8</mtext><mtext>4</mtext></mfrac></msup></mrow><mtext>5</mtext></mroot></mrow></msqrt></mrow><mtext>3</mtext></mroot></math> =

= <math mathsize="1.2em"><mroot><mrow><msup><mtext>m</mtext><mtext>2</mtext></msup><mtext>&#xd7;</mtext><msqrt><mrow><mtext>m&#xd7;</mtext><mroot><mrow><msup><mtext>m</mtext><mtext>8</mtext></msup><msup><mtext>&#xd7;m</mtext><mn>2</mn></msup></mrow><mtext>5</mtext></mroot></mrow></msqrt></mrow><mtext>3</mtext></mroot></math> =

= <math mathsize="1.2em"><mroot><mrow><msup><mtext>m</mtext><mtext>2</mtext></msup><mtext>&#xd7;</mtext><msqrt><mrow><mtext>m&#xd7;</mtext><mroot><mrow><msup><mtext>m</mtext><mtext>8+2</mtext></msup></mrow><mtext>5</mtext></mroot></mrow></msqrt></mrow><mtext>3</mtext></mroot></math> =

= <math mathsize="1.2em"><mroot><mrow><msup><mtext>m</mtext><mtext>2</mtext></msup><mtext>&#xd7;</mtext><msqrt><mrow><mtext>m&#xd7;</mtext><mroot><mrow><msup><mtext>m</mtext><mtext>10</mtext></msup></mrow><mtext>5</mtext></mroot></mrow></msqrt></mrow><mtext>3</mtext></mroot></math> =

= <math mathsize="1.2em"><mroot><mrow><msup><mtext>m</mtext><mtext>2</mtext></msup><mtext>&#xd7;</mtext><msqrt><mrow><msup><mtext>m&#xd7;m</mtext><mfrac><mtext>10</mtext><mtext>5</mtext></mfrac></msup></mrow></msqrt></mrow><mtext>3</mtext></mroot></math> =

= <math mathsize="1.2em"><mroot><mrow><msup><mtext>m</mtext><mtext>2</mtext></msup><mtext>&#xd7;</mtext><msqrt><mrow><msup><mtext>m&#xd7;m</mtext><mn>2</mn></msup></mrow></msqrt></mrow><mtext>3</mtext></mroot></math> =

= <math mathsize="1.2em"><mroot><mrow><msup><mtext>m</mtext><mtext>2</mtext></msup><mtext>&#xd7;</mtext><msqrt><mrow><msup><mtext>m</mtext><mtext>1+2</mtext></msup></mrow></msqrt></mrow><mtext>3</mtext></mroot></math> =

= <math mathsize="1.2em"><mroot><mrow><msup><mtext>m</mtext><mtext>2</mtext></msup><mtext>&#xd7;</mtext><msqrt><mrow><msup><mtext>m</mtext><mtext>3</mtext></msup></mrow></msqrt></mrow><mtext>3</mtext></mroot></math> =

= <math mathsize="1.2em"><mroot><mrow><msup><mtext>m</mtext><mtext>2</mtext></msup><msup><mtext>&#xd7;m</mtext><mfrac><mtext>3</mtext><mtext>2</mtext></mfrac></msup></mrow><mtext>3</mtext></mroot></math> =

=<math mathsize="1.2em"><mroot><mrow><msup><mtext>m</mtext><mfrac><mtext>7</mtext><mtext>2</mtext></mfrac></msup></mrow><mtext>3</mtext></mroot></math> =

= <math mathsize="1.2em"><msup><mi mathvariant="normal">m</mi><mrow><mfrac><mn>7</mn><mn>2</mn></mfrac><mo>&#xd7;</mo><mfrac><mn>1</mn><mn>3</mn></mfrac></mrow></msup></math> =

= <math mathsize="1.2em"><msup><mi mathvariant="normal">m</mi><mfrac><mn>7</mn><mn>6</mn></mfrac></msup></math> =

= <math mathsize="1.2em"><mtext mathcolor="#ff0000">m&#xd7;</mtext><mroot mathcolor="#ff0000"><mtext mathcolor="#ff0000">m</mtext><mtext mathcolor="#ff0000">6</mtext></mroot></math>
