<pre><b><p class ="Aufgabe">Aufgabe 119

<math mathsize="1.2em"><msqrt><mrow><mfrac><mi mathvariant="normal">a</mi><mi mathvariant="normal">b</mi></mfrac><msqrt><mrow><mfrac><mi mathvariant="normal">b</mi><mi mathvariant="normal">a</mi></mfrac><msqrt><mfrac><mi mathvariant="normal">a</mi><mi mathvariant="normal">b</mi></mfrac></msqrt></mrow></msqrt></mrow></msqrt></math> =

= <math mathsize="1.2em"><msqrt><mrow><mfrac><mi mathvariant="normal">a</mi><mi mathvariant="normal">b</mi></mfrac><msqrt><mrow><mfrac><mi mathvariant="normal">b</mi><mi mathvariant="normal">a</mi></mfrac><mo>&#xd7;</mo><mfrac><mrow><msup><mi mathvariant="normal">a</mi><mfrac><mn>1</mn><mn>2</mn></mfrac></msup></mrow><mrow><msup><mi mathvariant="normal">b</mi><mfrac><mn>1</mn><mn>2</mn></mfrac></msup></mrow></mfrac></mrow></msqrt></mrow></msqrt></math> =

= <math mathsize="1.2em"><msqrt><mfrac><mrow><msup><mtext>a&#xd7;b</mtext><mfrac><mtext>1</mtext><mtext>2</mtext></mfrac></msup><msup><mtext>&#xd7;a</mtext><mrow><mfrac><mtext>1</mtext><mtext>2</mtext></mfrac><mtext>&#xd7;</mtext><mfrac><mtext>1</mtext><mtext>2</mtext></mfrac></mrow></msup></mrow><mrow><msup><mtext>b&#xd7;a</mtext><mfrac><mtext>1</mtext><mtext>2</mtext></mfrac></msup><msup><mtext>&#xd7;b</mtext><mrow><mfrac><mtext>1</mtext><mtext>2</mtext></mfrac><mtext>&#xd7;</mtext><mfrac><mtext>1</mtext><mtext>2</mtext></mfrac></mrow></msup></mrow></mfrac></msqrt></math> =

= <math mathsize="1.2em"><msqrt><mfrac><mrow><msup><mtext>a&#xd7;b</mtext><mfrac><mtext>1</mtext><mtext>2</mtext></mfrac></msup><msup><mtext>&#xd7;a</mtext><mfrac><mtext>1</mtext><mtext>4</mtext></mfrac></msup></mrow><mrow><msup><mtext>b&#xd7;a</mtext><mfrac><mtext>1</mtext><mtext>2</mtext></mfrac></msup><msup><mtext>&#xd7;b</mtext><mfrac><mtext>1</mtext><mtext>4</mtext></mfrac></msup></mrow></mfrac></msqrt></math> =

= <math mathsize="1.2em"><mfrac><mrow><msup><mtext>a</mtext><mfrac><mtext>1</mtext><mtext>2</mtext></mfrac></msup><msup><mtext>&#xd7;b</mtext><mfrac><mtext>1</mtext><mtext>2</mtext></mfrac></msup><msup><mtext>&#xd7;a</mtext><mrow><mfrac><mtext>1</mtext><mtext>4</mtext></mfrac><mtext>&#xd7;</mtext><mfrac><mtext>1</mtext><mtext>2</mtext></mfrac></mrow></msup></mrow><mrow><msup><mtext>b</mtext><mfrac><mtext>1</mtext><mtext>2</mtext></mfrac></msup><mtext>&#xd7;</mtext><msup><mtext>a</mtext><mrow><mfrac><mtext>1</mtext><mtext>2</mtext></mfrac><mtext>&#xd7;</mtext><mfrac><mtext>1</mtext><mtext>2</mtext></mfrac></mrow></msup><mtext>&#xd7;</mtext><msup><mtext>b</mtext><mrow><mfrac><mtext>1</mtext><mtext>4</mtext></mfrac><mtext>&#xd7;</mtext><mfrac><mtext>1</mtext><mtext>2</mtext></mfrac></mrow></msup></mrow></mfrac></math> =

= <math mathsize="1.2em"><mfrac><mrow><msup><mtext>a</mtext><mfrac><mtext>1</mtext><mtext>2</mtext></mfrac></msup><msup><mtext>&#xd7;b</mtext><mfrac><mtext>1</mtext><mtext>4</mtext></mfrac></msup><msup><mtext>&#xd7;a</mtext><mfrac><mtext>1</mtext><mtext>8</mtext></mfrac></msup></mrow><mrow><msup><mtext>b</mtext><mfrac><mtext>1</mtext><mtext>2</mtext></mfrac></msup><mtext>&#xd7;</mtext><msup><mtext>a</mtext><mfrac><mtext>1</mtext><mtext>4</mtext></mfrac></msup><mtext>&#xd7;</mtext><msup><mtext>b</mtext><mfrac><mtext>1</mtext><mtext>8</mtext></mfrac></msup></mrow></mfrac></math> =

= <math mathsize="1.2em"><mfrac><mrow><msup><mi mathvariant="normal">a</mi><mrow><mfrac><mn>1</mn><mn>2</mn></mfrac><mo>+</mo><mfrac><mn>1</mn><mn>8</mn></mfrac><mo>&#x2212;</mo><mfrac><mn>1</mn><mn>4</mn></mfrac></mrow></msup></mrow><mrow><msup><mi mathvariant="normal">b</mi><mrow><mfrac><mn>1</mn><mn>2</mn></mfrac><mo>+</mo><mfrac><mn>1</mn><mn>8</mn></mfrac><mo>&#x2212;</mo><mfrac><mn>1</mn><mn>4</mn></mfrac></mrow></msup></mrow></mfrac></math> =

= <math mathsize="1.2em"><mfrac><mrow><msup><mtext>a</mtext><mfrac><mtext>4+1&#x2212;2</mtext><mtext>8</mtext></mfrac></msup></mrow><mrow><msup><mtext>b</mtext><mfrac><mtext>4+1&#x2212;2</mtext><mtext>8</mtext></mfrac></msup></mrow></mfrac></math> =

= <math mathsize="1.2em"><mfrac><mrow><msup><mi mathvariant="normal">a</mi><mfrac><mn>3</mn><mn>8</mn></mfrac></msup></mrow><mrow><msup><mi mathvariant="normal">b</mi><mfrac><mn>3</mn><mn>8</mn></mfrac></msup></mrow></mfrac></math> =

= <math mathsize="1.2em"><mroot mathcolor="#ff0000"><mfrac mathcolor="#ff0000"><mrow><msup><mi mathvariant="normal" mathcolor="#ff0000">a</mi><mn mathcolor="#ff0000">3</mn></msup></mrow><mrow><msup><mi mathvariant="normal" mathcolor="#ff0000">b</mi><mn mathcolor="#ff0000">3</mn></msup></mrow></mfrac><mn mathcolor="#ff0000">8</mn></mroot></math>

</p></b></pre>
