<pre><b><p class ="Aufgabe">Aufgabe 119

<math mathsize="1.2em"><msqrt><mrow><mfrac><mi mathvariant="bold">a</mi><mi mathvariant="bold">b</mi></mfrac><msqrt><mrow><mfrac><mi mathvariant="bold">b</mi><mi mathvariant="bold">a</mi></mfrac><msqrt><mfrac><mi mathvariant="bold">a</mi><mi mathvariant="bold">b</mi></mfrac></msqrt></mrow></msqrt></mrow></msqrt></math>

= <math mathsize="1.2em"><msqrt><mrow><mfrac><mi mathvariant="bold">a</mi><mi mathvariant="bold">b</mi></mfrac><msqrt><mrow><mfrac><mi mathvariant="bold">b</mi><mi mathvariant="bold">a</mi></mfrac><mo mathvariant="bold">&#xd7;</mo><mfrac><mrow><msup><mi mathvariant="bold">a</mi><mfrac><mn mathvariant="bold">1</mn><mn mathvariant="bold">2</mn></mfrac></msup></mrow><mrow><msup><mi mathvariant="bold">b</mi><mfrac><mn mathvariant="bold">1</mn><mn mathvariant="bold">2</mn></mfrac></msup></mrow></mfrac></mrow></msqrt></mrow></msqrt></math>

= <math mathsize="1.2em"><msqrt><mfrac><mrow><msup><mtext mathvariant="bold">a&#xd7;b</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">2</mtext></mfrac></msup><msup><mtext mathvariant="bold">&#xd7;a</mtext><mrow><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">2</mtext></mfrac><mtext mathvariant="bold">&#xd7;</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">2</mtext></mfrac></mrow></msup></mrow><mrow><msup><mtext mathvariant="bold">b&#xd7;a</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">2</mtext></mfrac></msup><msup><mtext mathvariant="bold">&#xd7;b</mtext><mrow><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">2</mtext></mfrac><mtext mathvariant="bold">&#xd7;</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">2</mtext></mfrac></mrow></msup></mrow></mfrac></msqrt></math>

= <math mathsize="1.2em"><msqrt><mfrac><mrow><msup><mtext mathvariant="bold">a&#xd7;b</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">2</mtext></mfrac></msup><msup><mtext mathvariant="bold">&#xd7;a</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">4</mtext></mfrac></msup></mrow><mrow><msup><mtext mathvariant="bold">b&#xd7;a</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">2</mtext></mfrac></msup><msup><mtext mathvariant="bold">&#xd7;b</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">4</mtext></mfrac></msup></mrow></mfrac></msqrt></math>

= <math mathsize="1.2em"><mfrac><mrow><msup><mtext mathvariant="bold">a</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">2</mtext></mfrac></msup><msup><mtext mathvariant="bold">&#xd7;b</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">2</mtext></mfrac></msup><msup><mtext mathvariant="bold">&#xd7;a</mtext><mrow><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">4</mtext></mfrac><mtext mathvariant="bold">&#xd7;</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">2</mtext></mfrac></mrow></msup></mrow><mrow><msup><mtext mathvariant="bold">b</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">2</mtext></mfrac></msup><msup><mtext mathvariant="bold">&#xd7;a</mtext><mrow><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">2</mtext></mfrac><mtext mathvariant="bold">&#xd7;</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">2</mtext></mfrac></mrow></msup><msup><mtext mathvariant="bold">&#xd7;b</mtext><mrow><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">4</mtext></mfrac><mtext mathvariant="bold">&#xd7;</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">2</mtext></mfrac></mrow></msup></mrow></mfrac></math>

= <math mathsize="1.2em"><mfrac><mrow><msup><mtext mathvariant="bold">a</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">2</mtext></mfrac></msup><msup><mtext mathvariant="bold">&#xd7;b</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">4</mtext></mfrac></msup><msup><mtext mathvariant="bold">&#xd7;a</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">8</mtext></mfrac></msup></mrow><mrow><msup><mtext mathvariant="bold">b</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">2</mtext></mfrac></msup><msup><mtext mathvariant="bold">&#xd7;a</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">4</mtext></mfrac></msup><msup><mtext mathvariant="bold">&#xd7;b</mtext><mfrac><mtext mathvariant="bold">1</mtext><mtext mathvariant="bold">8</mtext></mfrac></msup></mrow></mfrac></math>

= <math mathsize="1.2em"><mfrac><mrow><msup><mi mathvariant="bold">a</mi><mrow><mfrac><mn mathvariant="bold">1</mn><mn mathvariant="bold">2</mn></mfrac><mo mathvariant="bold">+</mo><mfrac><mn mathvariant="bold">1</mn><mn mathvariant="bold">8</mn></mfrac><mo mathvariant="bold">&#x2212;</mo><mfrac><mn mathvariant="bold">1</mn><mn mathvariant="bold">4</mn></mfrac></mrow></msup></mrow><mrow><msup><mi mathvariant="bold">b</mi><mrow><mfrac><mn mathvariant="bold">1</mn><mn mathvariant="bold">2</mn></mfrac><mo mathvariant="bold">+</mo><mfrac><mn mathvariant="bold">1</mn><mn mathvariant="bold">8</mn></mfrac><mo mathvariant="bold">&#x2212;</mo><mfrac><mn mathvariant="bold">1</mn><mn mathvariant="bold">4</mn></mfrac></mrow></msup></mrow></mfrac></math>

= <math mathsize="1.2em"><mfrac><mrow><msup><mtext mathvariant="bold">a</mtext><mfrac><mtext mathvariant="bold">4+1&#x2212;2</mtext><mtext mathvariant="bold">8</mtext></mfrac></msup></mrow><mrow><msup><mtext mathvariant="bold">b</mtext><mfrac><mtext mathvariant="bold">4+1&#x2212;2</mtext><mtext mathvariant="bold">8</mtext></mfrac></msup></mrow></mfrac></math>

= <math mathsize="1.2em"><mfrac><mrow><msup><mi mathvariant="bold">a</mi><mfrac><mn mathvariant="bold">3</mn><mn mathvariant="bold">8</mn></mfrac></msup></mrow><mrow><msup><mi mathvariant="bold">b</mi><mfrac><mn mathvariant="bold">3</mn><mn mathvariant="bold">8</mn></mfrac></msup></mrow></mfrac></math>

= <math mathsize="1.2em"><mroot mathcolor="#ff0000"><mfrac><mrow><msup><mi mathvariant="bold" mathcolor="#ff0000">a</mi><mn mathvariant="bold" mathcolor="#ff0000">3</mn></msup></mrow><mrow><msup><mi mathvariant="bold" mathcolor="#ff0000">b</mi><mn mathvariant="bold" mathcolor="#ff0000">3</mn></msup></mrow></mfrac><mn mathvariant="bold" mathcolor="#ff0000">8</mn></mroot></math>

</p></b></pre>
